<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>TechWave</title>
</head>
<body>
<nav class="bg-[#1A0B2E] border-b border-gray-700">
    <div class="flex justify-between items-center px-4 sm:px-8 py-4">
        <h1 class="text-2xl font-bold text-white">
            Tech<span
                class="bg-gradient-to-r from-[#F7E93F] via-[#FB09B4] to-[#9100F8] bg-clip-text text-transparent">Wave</span>
        </h1>
        <button class="lg:hidden">
            <img src="./assets/hamburger-menu.png" alt="Menu" class="w-8 h-8">
        </button>
        <div class="hidden lg:flex gap-8">
            <a href="#about" class="text-white transition-colors duration-300 hover:text-green-500">About</a>
            <a href="#episodes" class="text-white transition-colors duration-300 hover:text-green-500">Episodes</a>
            <a href="#host" class="text-white transition-colors duration-300 hover:text-green-500">Host</a>
        </div>
        <a href="https://open.spotify.com/show/" target="_blank" rel="noopener noreferrer"
            class="hidden lg:flex text-white px-6 py-2 rounded-full bg-gradient-to-r from-[#F7E93F] via-[#FB09B4] to-[#9100F8] transition-all duration-300 ease-in-out hover:scale-105 hover:shadow-lg hover:shadow-purple-500/50">
            Subscribe →
        </a>
    </div>
</nav>
    

<div class="w-full bg-cover bg-center bg-no-repeat" style="background-image: url('./assets/hero-bg.png');">
    <div class="flex items-center justify-center py-8 sm:py-12 lg:min-h-screen px-4 lg:px-8">
        <div class="text-center">
            <div class="relative inline-block mt-4 sm:mt-10 mb-6 sm:mb-10">
                <img src="./assets/hero-circle.png" alt="Circle"
                    class="w-[180px] h-[180px] sm:w-[250px] sm:h-[250px] lg:w-[350px] lg:h-[350px]">
                <img src="./assets/microphone.png" alt="Microphone"
                    class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-12 sm:w-16 lg:w-auto lg:top-[75px] lg:left-[115px] lg:translate-x-0 lg:translate-y-0 microphone-icon cursor-pointer">
                <span
                    class="absolute -top-2 right-0 sm:top-4 sm:right-4 lg:top-6 lg:right-6 bg-green-500 text-black text-[10px] sm:text-xs lg:text-sm font-bold px-2 sm:px-3 py-0.5 sm:py-1 lg:px-4 rounded-full">NEW</span>
            </div>

            <h2 class="text-white font-bold text-3xl sm:text-4xl lg:text-6xl mb-3 sm:mb-4 lg:mb-6">TechWave</h2>

            <p class="text-gray-400 text-xs sm:text-sm lg:text-lg mb-6 sm:mb-8 lg:mb-10 px-4 sm:px-2 lg:px-0   max-w-[280px] sm:max-w-md lg:max-w-none mx-auto">
                Your daily dose of tech insights, productivity hacks, and
                personal growth</p>

            <div class="flex flex-row gap-3 sm:gap-4 justify-center items-center">
                <a href="https://open.spotify.com/show/" target="_blank" rel="noopener noreferrer"
                    class="bg-gradient-to-r from-[#F7E93F] via-[#FB09B4] to-[#9100F8] text-white px-4 sm:px-6 lg:px-8 py-2.5 sm:py-3 rounded-full flex items-center justify-center gap-2 text-sm sm:text-base transition-all duration-300 ease-in-out hover:scale-105 hover:shadow-lg hover:shadow-purple-500/50">
                    <img src="./assets/spotify.png" alt="Spotify" class="w-4 h-4 sm:w-5 sm:h-5">
                    Listen On Spotify
                </a>
                <a href="https://open.spotify.com/show/" target="_blank" rel="noopener noreferrer"
                    class="border-2 border-green-500 text-green-500 px-4 sm:px-6 lg:px-8 py-2.5 sm:py-3 rounded-full flex items-center justify-center gap-2 text-sm sm:text-base transition-all duration-300 ease-in-out hover:scale-105 hover:shadow-lg hover:shadow-green-500/50 hover:bg-green-500/10">
                    <img src="./assets/message.png" alt="Message" class="w-4 h-4 sm:w-5 sm:h-5">
                    Subscribe
                </a>
            </div>
        </div>
    </div>
</div>


</body>
</html>
